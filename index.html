<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계 세계 탐험대!</title>
    <!-- In-App Browser Escape Script -->
    <script>
        (function () {
            var userAgent = navigator.userAgent.toLowerCase();
            var targetUrl = location.href;
            
            // 인앱 브라우저 감지 (카카오톡, 페이스북, 인스타그램, 네이버, 라인, 다음)
            if (userAgent.match(/kakaotalk|facebook|fban|fbav|fb_iab|instagram|naver|line|daum/i)) {
                if (userAgent.match(/android/i)) {
                    // 안드로이드: 크롬 브라우저로 강제 이동
                    var scheme = location.protocol.replace(':', '');
                    var urlWithoutProtocol = targetUrl.replace(new RegExp('^' + location.protocol + '//'), '');
                    location.href = 'intent://' + urlWithoutProtocol + '#Intent;scheme=' + scheme + ';package=com.android.chrome;end';
                } else if (userAgent.match(/iphone|ipad|ipod/i)) {
                    // iOS
                    if (userAgent.match(/kakaotalk/i)) {
                        // 아이폰 카카오톡: 외부 브라우저(Safari)로 열기 스키마 사용
                        location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(targetUrl);
                    } else {
                        // 아이폰 페이스북 등: 자동 전환이 어려워 사용자에게 안내
                        alert('원활한 지도 화면을 위해 우측 하단(또는 상단)의 [Safari로 열기] 또는 [기본 브라우저로 열기]를 눌러주세요.');
                    }
                }
            }
        })();
    </script>
    <!-- Google Fonts for Kid-friendly typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="lib/leaflet.css" />

    <!-- Globe.gl (requires Three.js implicitly via its bundle usually, but globe.gl standalone includes it) -->
    <script src="lib/globe.gl.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button id="mode-toggle">🌍 지구본 모드</button>
    <button id="sound-toggle">🔊 소리 켜짐</button>

    <div id="map"></div>
    <div id="globe" class="hidden"></div>

    <div id="info-panel" class="hidden">
        <h1 id="country-name">나라 이름</h1>
        <img id="country-flag" src="" alt="국기">
        <div class="capital-container">
            <span class="capital-label">수도:</span>
            <span id="capital-name">수도 이름</span>
        </div>
        <button id="close-btn">닫기</button>
    </div>

    <div id="welcome-message">
        <h2>지도에서 궁금한 나라를 클릭해봐요!</h2>
    </div>

    <!-- Leaflet JS -->
    <script src="lib/leaflet.js"></script>

    <!-- Scripts -->
    <script src="lib/three-globe.js"></script>
    <script src="lib/world_geojson.js"></script>
    <script src="lib/earth_water_base64.js"></script>
    <script src="countries_data.js"></script>
    <script src="kr_capitals.js"></script>
    <script src="script.js"></script>
</body>

</html>
