<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계 세계 탐험대!</title>
    <!-- Google Fonts for Kid-friendly typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="lib/leaflet.css" />

    <!-- Globe.gl (requires Three.js implicitly via its bundle usually, but globe.gl standalone includes it) -->
    <script src="lib/globe.gl.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button id="mode-toggle">🌍 지구본 모드</button>
    <button id="sound-toggle">🔊 소리 켜짐</button>

    <div id="map"></div>
    <div id="globe" class="hidden"></div>

    <div id="info-panel" class="hidden">
        <h1 id="country-name">나라 이름</h1>
        <img id="country-flag" src="" alt="국기">
        <div class="capital-container">
            <span class="capital-label">수도:</span>
            <span id="capital-name">수도 이름</span>
        </div>
        <button id="close-btn">닫기</button>
    </div>

    <div id="welcome-message">
        <h2>지도에서 궁금한 나라를 클릭해봐요!</h2>
    </div>

    <!-- Leaflet JS -->
    <script src="lib/leaflet.js"></script>

    <!-- Scripts -->
    <script src="lib/three-globe.js"></script>
    <script src="lib/world_geojson.js"></script>
    <script src="lib/earth_water_base64.js"></script>
    <script src="countries_data.js"></script>
    <script src="kr_capitals.js"></script>
    <script src="script.js"></script>
</body>

</html>
